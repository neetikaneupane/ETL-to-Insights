services:
  postgres:
    image: postgres:16
    container_name: etl_postgres
    restart: unless-stopped
    env_file:
      - ../config/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql

  minio:
    image: minio/minio:latest
    container_name: etl_to_insights_minio
    restart: unless-stopped
    env_file:
      - ../config/.env
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  airflow-postgres:
    image: postgres:15
    container_name: etl_to_insights_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: etl_airflow_custom:latest
    container_name: etl_to_insights_airflow_init
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ../dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
      - ../config:/opt/airflow/config
      - ../database:/opt/airflow/database
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    image: etl_airflow_custom:latest
    container_name: etl_to_insights_airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: etl_insights
      DB_USER: postgres
      DB_PASSWORD: changeme
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: etl-data
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
      - ../config:/opt/airflow/config
      - ../database:/opt/airflow/database
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    command: webserver

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: etl_api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ../config/.env
    ports:
      - "8000:8000"

  airflow-scheduler:
    image: etl_airflow_custom:latest
    container_name: etl_to_insights_airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: etl_insights
      DB_USER: postgres
      DB_PASSWORD: changeme
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: etl-data
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
      - ../config:/opt/airflow/config
      - ../database:/opt/airflow/database
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  postgres_data:
  minio_data:
  airflow_postgres_data:
  airflow_logs: